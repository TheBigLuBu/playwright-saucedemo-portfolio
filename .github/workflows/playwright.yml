name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 22 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - - name: Get last Allure history
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        curl -sSL https://TheBigLuBu.github.io/playwright-saucedemo-portfolio/history/history.json -o allure-results/history/history.json || true
        curl -sSL https://TheBigLuBu.github.io/playwright-saucedemo-portfolio/history/history-trend.json -o allure-results/history/history-trend.json || true
        curl -sSL https://TheBigLuBu.github.io/playwright-saucedemo-portfolio/history/duration-trend.json -o allure-results/history/duration-trend.json || true
        curl -sSL https://TheBigLuBu.github.io/playwright-saucedemo-portfolio/history/retry-trend.json -o allure-results/history/retry-trend.json || true
        curl -sSL https://TheBigLuBu.github.io/playwright-saucedemo-portfolio/history/categories-trend.json -o allure-results/history/categories-trend.json || true

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Generate Allure report
      if: ${{ !cancelled() }}
      run: npx allure generate allure-results --clean -o allure-report

    - name: Setup Pages
      if: ${{ !cancelled() }}
      uses: actions/configure-pages@v5

    - name: Upload Allure report to Pages
      if: ${{ !cancelled() }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: allure-report

    - name: Deploy to GitHub Pages
      if: ${{ !cancelled() }}
      id: deployment
      uses: actions/deploy-pages@v4
